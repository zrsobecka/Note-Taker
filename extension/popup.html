<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Obsidian Note Taker</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main class="shell">
      <header>
        <h1>Obsidian Note Taker</h1>
        <div id="llmStatus" class="statusBadge statusChecking">LLM: checking...</div>
        <p id="sourceStatus">Select text on the page or copy text first.</p>
      </header>

      <label>
        Title
        <input id="titleInput" type="text" autocomplete="off" placeholder="e.g. HTTP headers in practice">
      </label>

      <label>
        Folder
        <select id="folderInput">
          <option value="">Loading folders...</option>
        </select>
      </label>

      <label>
        Note language
        <select id="languageInput">
          <option value="polski" selected>Polski</option>
          <option value="angielski">English</option>
        </select>
      </label>

      <label>
        Model
        <select id="modelInput">
          <option value="">Loading models...</option>
        </select>
      </label>

      <button id="saveButton" type="button">Add to queue</button>

      <section class="queue" aria-labelledby="queueTitle">
        <div class="queueHeader">
          <h2 id="queueTitle">Note queue</h2>
          <div class="queueHeaderActions">
            <button id="openMonitorButton" class="secondaryButton" type="button">Open monitor</button>
            <button id="clearFinishedButton" class="secondaryButton" type="button">Clear done</button>
          </div>
        </div>
        <div id="queueEmpty" class="emptyQueue">No notes running.</div>
        <div id="queueList" class="queueList"></div>
      </section>

      <section id="resultBox" class="result" hidden>
        <div class="resultHeader">
          <strong>Status</strong>
          <button id="copyButton" type="button">Copy</button>
        </div>
        <pre id="resultText"></pre>
      </section>
    </main>

    <script type="module" src="popup.js"></script>
  </body>
</html>
